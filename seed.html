<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seed Data | Socially</title>
    <script src="js/global/theme-init.js"></script>
    <link rel="stylesheet" href="global.css" />
  </head>
  <body>
    <main
      style="
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      "
    >
      <section class="card" style="max-width: 480px; text-align: center">
        <h1 class="page-title">Seed Demo Data</h1>
        <p class="text-secondary" id="status">
          This will create 5 users, 12 posts, comments, likes, and follow
          relationships for testing.
        </p>
        <button
          class="btn btn-primary btn-block"
          id="seed-btn"
          type="button"
          style="margin-top: var(--space-4)"
        >
          Seed Database
        </button>
        <button
          class="btn btn-danger btn-block"
          id="clear-btn"
          type="button"
          style="margin-top: var(--space-2)"
        >
          Clear All Data
        </button>
        <p style="margin-top: var(--space-4)">
          <a href="pages/login.html">Go to Login</a>
        </p>
      </section>
    </main>

    <script type="module">
      const seedBtn = document.getElementById("seed-btn");
      const clearBtn = document.getElementById("clear-btn");
      const status = document.getElementById("status");

      seedBtn.addEventListener("click", async () => {
        seedBtn.disabled = true;
        status.textContent = "Seeding...";
        try {
          const result = await import("./js/seed.js");
          if (result.default) {
            status.textContent =
              "Done! 5 users created. Login with alice@example.com / TestPass123";
          } else {
            status.textContent =
              "Database already has data. Clear first to re-seed.";
          }
        } catch (err) {
          status.textContent = "Error: " + err.message;
          console.error(err);
        }
        seedBtn.disabled = false;
      });

      clearBtn.addEventListener("click", () => {
        localStorage.clear();
        status.textContent = "All data cleared. You can seed again.";
      });
    </script>
  </body>
</html>
