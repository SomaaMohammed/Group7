<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings | Socially</title>

    <script src="../js/global/theme-init.js"></script>

    <link rel="stylesheet" href="../global.css" />
    <link rel="stylesheet" href="../css/settings.css" />
    <script type="module" src="../js/settings.js"></script>
  </head>
  <body class="app-shell">
    <div id="shell-root"></div>

    <main class="app-main" id="settings-page-main">
      <div class="content-column page-enter">
        <section class="card" aria-label="Settings page">
          <h1 class="page-title">Settings</h1>
          <section class="card" aria-labelledby="appearance">
            <h2 id="appearance-heading" class="settings-main-section-title">Appearance</h2>
            <div class="main-settings-row">
              <span class="main-settings-row-label" id="theme-toggle-label">XXXX</span>
              <button id="settings-theme-toggle" class="icon-btn theme-toggle-btn" data-theme-toggle aria-label="Toggle theme label" type="button" ></button>
            </div>
          </section>
        <section class="card" aria-labelledby="account">
          <h2 id="account-heading" class="settings-main-section-title">Account</h2>
 
          <div class="main-settings-row">
            <span class="main-settings-row-label">Session</span>
            <button id="logout-btn" class="btn btn-danger btn-sm" type="button">
              Log out
            </button>
          </div>
 
          <hr class="divider" />
 
          <div class="main-settings-row">
            <span class="main-settings-row-label">
              Change Password
              <span class="settings-badge">Yet to Implement</span>
            </span>
            <button class="btn btn-ghost btn-sm" type="button" disabled>
              Change
            </button>
          </div>
 
          <div class="main-settings-row">
            <span class="main-settings-row-label main-settings-row-label--danger">
              Delete Account
              <span class="settings-badge">Yet to Implement</span>
            </span>
            <button class="btn btn-ghost btn-sm" type="button" disabled>
              Delete
            </button>
          </div>
        </section>
      </div>
    </main>

    <div class="toast-container"></div>
  </body>
</html>
