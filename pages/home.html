<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home | Socially</title>

    <script src="../js/global/theme-init.js"></script>

    <link rel="stylesheet" href="../global.css" />
    <link rel="stylesheet" href="../css/home.css" />
    <script type="module" src="../js/home.js"></script>
  </head>
  <body class="app-shell">
    <div id="shell-root"></div>

    <main class="app-main">
      <div class="content-column page-enter home-content">
        <h1 class="page-title">Home</h1>

        <section class="card home-composer" aria-label="Create post">
          <p class="text-secondary">What&apos;s on your mind today?</p>
          <button class="btn btn-primary btn-block" id="composer-open-btn" type="button">
            New Post
          </button>
        </section>

        <div id="feed-list"></div>
      </div>
    </main>

    <div class="modal-backdrop hidden" id="new-post-backdrop">
      <div class="modal" role="dialog" aria-labelledby="new-post-title">
        <div class="modal-header">
          <h2 class="modal-title" id="new-post-title">New Post</h2>
          <button class="modal-close" id="new-post-close-btn" type="button" aria-label="Close">
            &times;
          </button>
        </div>
        <div class="input-group" style="padding: 0 var(--space-4)">
          <label class="input-label" for="new-post-content">What&apos;s on your mind?</label>
          <textarea
            class="textarea"
            id="new-post-content"
            rows="4"
            maxlength="5000"
            placeholder="Write something..."
          ></textarea>
          <p class="input-hint" id="new-post-char-count">0 / 5000</p>
        </div>

        <div class="attachment-drop-zone" id="new-post-drop-zone">
          Drop images or videos here
        </div>
        <div class="attachment-picker">
          <button class="btn btn-ghost btn-sm" id="new-post-attach-btn" type="button">
            Attach media
          </button>
          <input
            type="file"
            id="new-post-file-input"
            class="hidden"
            accept="image/jpeg,image/png,image/gif,image/webp,video/mp4,video/webm"
            multiple
          />
          <span class="text-secondary text-xs" id="new-post-attach-hint">Max 4 files</span>
        </div>
        <div class="attachment-previews" id="new-post-previews"></div>
        <p class="attachment-error hidden" id="new-post-attach-error"></p>

        <div class="modal-footer">
          <button class="btn btn-ghost" id="new-post-cancel-btn" type="button">Cancel</button>
          <button class="btn btn-primary" id="new-post-submit-btn" type="button" disabled>
            Post
          </button>
        </div>
      </div>
    </div>

    <div class="toast-container"></div>
  </body>
</html>
