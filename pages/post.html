<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Post | Socially</title>

    <script src="../js/global/theme-init.js"></script>

    <link rel="stylesheet" href="../global.css" />
    <link rel="stylesheet" href="../css/post.css" />
  </head>
  <body class="app-shell">
    <div id="shell-root"></div>

    <main class="app-main" id="post-page-main">
      <div class="content-column page-enter">
        <section class="card" aria-label="Post detail">
          <h1 class="page-title">Post</h1>

          <article aria-label="Post content">
            <header>
              <img
                id="post-author-avatar"
                src="../assets/default-avatar.svg"
                alt="Post author avatar"
              />
              <div>
                <h2 id="post-author-name">Author Name</h2>
                <p id="post-timestamp">Just now</p>
              </div>

              <button id="delete-btn" type="button">Delete</button>
            </header>

            <p id="post-content">Post content will appear here.</p>

            <div>
              <button id="like-btn" type="button">Like</button>
              <p><span id="post-like-count">0</span> likes</p>
            </div>
          </article>
        </section>

        <section aria-label="Comments">
          <h2>Comments</h2>

          <div id="comments-list"></div>

          <form id="comment-form">
            <label for="comment-input">Add a comment</label>
            <textarea
              id="comment-input"
              rows="3"
              maxlength="280"
              placeholder="Write a comment..."
            ></textarea>
            <button id="comment-submit-btn" type="submit">Comment</button>
          </form>
        </section>
      </div>
    </main>

    <div class="toast-container"></div>

    <script type="module" src="../js/post.js"></script>
  </body>
</html>
