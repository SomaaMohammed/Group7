<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Post | Socially</title>

    <script src="../js/global/theme-init.js"></script>

    <link rel="stylesheet" href="../global.css" />
    <link rel="stylesheet" href="../css/post.css" />
    <script type="module" src="../js/post.js"></script>
  </head>
  <body class="app-shell">
    <div id="shell-root"></div>

    <main class="app-main post-page" id="post-page-main">
      <div class="content-column page-enter">
        <section class="card post-detail-card" aria-label="Post detail">
          <h1 class="page-title">Post</h1>

          <article class="flex-col gap-4 post-detail" aria-label="Post content">
            <header class="flex items-center gap-3 post-author-row">
              <a id="post-author-link" class="post-author-link" href="#">
                <img
                  id="post-author-avatar"
                  class="avatar avatar-md post-author-avatar"
                  src="../assets/default-avatar.svg"
                  alt="Post author avatar"
                />
              </a>
              <div>
                <h2>
                  <a id="post-author-name" class="post-author-name" href="#"
                    >Author Name</a
                  >
                </h2>
                <p id="post-timestamp" class="text-secondary text-sm post-timestamp">
                  Just now
                </p>
              </div>

              <button
                id="delete-btn"
                class="btn btn-danger btn-sm hidden post-delete-btn"
                type="button"
                aria-label="Delete post"
                title="Delete post"
              >
                <span class="icon icon-trash" aria-hidden="true"></span>
              </button>
            </header>

            <p id="post-content" class="post-content">Post content will appear here.</p>

            <div id="post-media"></div>

            <div class="flex items-center gap-3 flex-wrap post-actions">
              <button
                id="like-btn"
                class="btn btn-outline btn-sm post-like-btn"
                type="button"
                aria-label="Like post"
                title="Like post"
              >
                <span class="like-pop-circle" aria-hidden="true"></span>
                <span class="icon icon-heart" aria-hidden="true"></span>
                <span class="icon icon-heart-fill" aria-hidden="true"></span>
              </button>
              <p class="text-secondary text-sm">
                <span id="post-like-count">0</span> likes
              </p>
            </div>
          </article>
        </section>

        <section class="card post-comments-card" aria-label="Comments">
          <h2 class="post-comments-title">Comments</h2>

          <form id="comment-form" class="flex-col gap-3 post-comment-form">
            <label class="input-label" for="comment-input">Add a comment</label>
            <textarea
              id="comment-input"
              class="textarea post-comment-input"
              rows="3"
              maxlength="280"
              placeholder="Write a comment..."
            ></textarea>
            <button
              id="comment-submit-btn"
              class="btn btn-primary btn-block post-comment-submit-btn"
              type="submit"
            >
              Comment
            </button>
          </form>

          <div id="comments-list" class="flex-col post-comments-list"></div>
        </section>
      </div>
    </main>

    <div class="toast-container"></div>
  </body>
</html>
