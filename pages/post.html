<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Post | Socially</title>

    <script src="../js/global/theme-init.js"></script>

    <link rel="stylesheet" href="../global.css" />
    <link rel="stylesheet" href="../css/post.css" />
  </head>
  <body class="app-shell">
    <div id="shell-root"></div>

    <main class="app-main" id="post-page-main">
      <div class="content-column page-enter">
        <section class="card" aria-label="Post detail">
          <h1 class="page-title">Post</h1>

          <article class="flex-col gap-4" aria-label="Post content">
            <header class="flex items-center gap-3">
              <img
                id="post-author-avatar"
                class="avatar avatar-md"
                src="../assets/default-avatar.svg"
                alt="Post author avatar"
              />
              <div>
                <h2 id="post-author-name">Author Name</h2>
                <p id="post-timestamp" class="text-secondary text-sm">Just now</p>
              </div>

              <button
                id="delete-btn"
                class="btn btn-danger btn-sm hidden"
                type="button"
              >
                Delete
              </button>
            </header>

            <p id="post-content">Post content will appear here.</p>

            <div class="flex items-center gap-3 flex-wrap">
              <button id="like-btn" class="btn btn-outline btn-sm" type="button">
                Like
              </button>
              <p class="text-secondary text-sm">
                <span id="post-like-count">0</span> likes
              </p>
            </div>
          </article>
        </section>

        <section class="card" aria-label="Comments">
          <h2>Comments</h2>

          <div id="comments-list" class="flex-col"></div>

          <form id="comment-form" class="flex-col gap-3">
            <label class="input-label" for="comment-input">Add a comment</label>
            <textarea
              id="comment-input"
              class="textarea"
              rows="3"
              maxlength="280"
              placeholder="Write a comment..."
            ></textarea>
            <button
              id="comment-submit-btn"
              class="btn btn-primary btn-block"
              type="submit"
            >
              Comment
            </button>
          </form>
        </section>
      </div>
    </main>

    <div class="toast-container"></div>

    <script type="module" src="../js/post.js"></script>
  </body>
</html>
