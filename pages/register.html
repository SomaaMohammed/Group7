<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | Socially</title>

    <script src="../js/global/theme-init.js"></script>

    <link rel="stylesheet" href="../global.css" />
    <link rel="stylesheet" href="../css/register.css" />
    <script type="module" src="../js/register.js"></script>
  </head>
  <body>
    <main class="register-page">
      <section
        class="register-card card auth-card"
        aria-labelledby="register-title"
      >
        <header class="register-header">
          <div class="register-header-top">
            <h1 id="register-title">Create account</h1>
            <button
              id="theme-toggle"
              class="btn btn-ghost btn-sm theme-toggle-btn"
              type="button"
              aria-label="Toggle theme"
            ></button>
          </div>
          <p>Join Socially and start posting.</p>
        </header>

        <form id="register-form" novalidate>
          <div class="input-group">
            <label class="input-label" for="username">Username</label>
            <input
              class="input"
              type="text"
              id="username"
              name="username"
              autocomplete="username"
              minlength="4"
              maxlength="24"
              required
            />
            <p class="input-hint" id="username-hint"></p>
          </div>

          <div class="input-group">
            <label class="input-label" for="email">Email</label>
            <input
              class="input"
              type="email"
              id="email"
              name="email"
              autocomplete="email"
              inputmode="email"
              required
            />
            <p class="input-hint" id="email-hint"></p>
          </div>

          <div class="input-group">
            <label class="input-label" for="password">Password</label>
            <div class="password-field">
              <input
                class="input"
                type="password"
                id="password"
                name="password"
                autocomplete="new-password"
                minlength="8"
                required
              />
              <button
                class="password-toggle"
                id="show-password"
                type="button"
                aria-controls="password"
                aria-label="Show password"
                aria-pressed="false"
              >
                <span
                  class="icon icon-eye password-toggle-icon"
                  aria-hidden="true"
                ></span>
                <span class="password-toggle-label">Show</span>
              </button>
            </div>
            <p class="input-hint" id="password-hint"></p>
          </div>

          <div class="input-group">
            <label class="input-label" for="confirm-password"
              >Confirm Password</label
            >
            <input
              class="input"
              type="password"
              id="confirm-password"
              name="confirmPassword"
              autocomplete="new-password"
              minlength="8"
              required
            />
            <p class="input-hint" id="confirm-password-hint"></p>
          </div>

          <button class="btn btn-primary btn-block" type="submit">
            Create account
          </button>
        </form>

        <p class="register-login-link auth-footer-link">
          Already have an account?
          <a href="login.html">Sign in</a>
        </p>
      </section>
    </main>

  </body>
</html>
