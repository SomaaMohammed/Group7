<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Profile | Socially</title>

    <script src="../js/global/theme-init.js"></script>

    <link rel="stylesheet" href="../global.css" />
    <link rel="stylesheet" href="../css/user.css" />
  </head>
  <body class="app-shell">
    <div id="shell-root"></div>

    <main class="app-main" id="user-page-main">
      <div class="content-column page-enter">
        <section class="card" aria-labelledby="profile-heading">
          <header>
            <div>
              <a id="profile-identity-link" href="#">
                <img
                  id="profile-avatar"
                  class="avatar avatar-2xl"
                  src="../assets/default-avatar.svg"
                  alt="User avatar"
                />
              </a>
            </div>

            <div>
              <h1 id="profile-heading">
                <a id="profile-name" href="#">Username</a>
              </h1>
              <p id="profile-handle" class="text-secondary">@username</p>
            </div>

            <div>
              <button
                id="profile-action-btn"
                class="btn btn-follow"
                type="button"
              >
                Follow
              </button>
            </div>
          </header>

          <p id="profile-bio" class="text-secondary">
            This is the user bio section. It will be populated from local
            storage.
          </p>

          <div class="profile-stats" aria-label="Profile statistics">
            <span class="profile-stat"
              ><span id="profile-posts-count" class="profile-stat-value">0</span>
              Posts</span
            >
            <span class="profile-stat"
              ><span
                id="profile-followers-count"
                class="profile-stat-value"
                >0</span
              >
              Followers</span
            >
            <span class="profile-stat"
              ><span
                id="profile-following-count"
                class="profile-stat-value"
                >0</span
              >
              Following</span
            >
          </div>
        </section>

        <section id="edit-profile-form" class="card hidden" aria-label="Profile Editing">
          <h2 class="profile-main-change">Edit Profile</h2>
 
          <div class="flex-col gap-4">
            <div class="input-group">

              <label class="input-label" for="edit-username">Username</label>
              <input id="edit-username" class="input" type="text" placeholder="Your username" maxlength="24" minlength="4"

                autocomplete="username"
              />
              <span id="edit-username-hint" class="input-hint"></span>

            </div>
 
            <div class="input-group">
              <label class="input-label" for="edit-bio">Bio</label>
              <textarea id="edit-bio" class="textarea" placeholder="What do you want to share about yourself" maxlength="200"></textarea>
            </div>
 
            <div class="input-group">

              <label class="input-label" for="edit-avatar-url">URL of Profile Picture</label>

              <input id="edit-avatar-url" class="input" type="url" placeholder="https://example.com/avatar.jpg"
                autocomplete="off"
              />

              <span id="avatar-hint" class="input-hint">Default avatar used when left blank</span>
            </div>
 
            <div class="change-actions">

              <button id="edit-cancel-btn" class="btn btn-ghost" type="button">Cancel</button>

              <button id="edit-save-btn" class="btn btn-primary" type="button">Save changes</button>
            </div>

          </div>
        </section>

        <section aria-labelledby="posts-title">
          <h2 id="posts-title" class="page-title">Posts</h2>

          <div id="user-posts-list" class="flex-col gap-4">
            <article class="card">
              <p class="text-secondary">
                No posts yet. User posts will render here.
              </p>
            </article>
          </div>
        </section>
      </div>
    </main>

    <div class="toast-container"></div>

    <script type="module" src="../js/user.js"></script>
  </body>
</html>
