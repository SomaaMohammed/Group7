<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings | UNI HUB</title>

    <script src="../js/global/theme-init.js"></script>

    <link rel="stylesheet" href="../global.css" />
    <link rel="stylesheet" href="../css/settings.css" />
    <script type="module" src="../js/settings.js"></script>
  </head>
  <body class="app-shell">
    <div id="shell-root"></div>

    <main class="app-main" id="settings-page-main">
      <div class="content-column page-enter">
        <section class="card" aria-label="Settings page">
          <h1 class="page-title">Settings</h1>
          <section class="card" aria-labelledby="appearance">
            <h2 id="appearance-heading" class="settings-main-section-title">Appearance</h2>
            <div class="main-settings-row">
              <span class="main-settings-row-label" id="theme-toggle-label">XXXX</span>
              <button id="settings-theme-toggle" class="icon-btn theme-toggle-btn" data-theme-toggle aria-label="Toggle theme label" type="button" ></button>
            </div>
          </section>
        <section class="card" aria-labelledby="account">
          <h2 id="account-heading" class="settings-main-section-title">Account</h2>
 
          <div class="main-settings-row">
            <span class="main-settings-row-label">Session</span>
            <button id="logout-btn" class="btn btn-danger btn-sm" type="button">
              Log out
            </button>
          </div>
 
          <hr class="divider" />
 
          <div class="main-settings-row">
            <span class="main-settings-row-label">Change Password</span>
            <button id="change-password-toggle-btn" class="btn btn-ghost btn-sm" type="button">
              Change
            </button>
          </div>

          <form id="change-password-form" class="settings-inline-form hidden">
            <div class="input-group">
              <label class="input-label" for="current-password">Current Password</label>
              <input id="current-password" class="input" type="password" placeholder="Enter current password" />
              <p class="input-hint" id="current-password-hint"></p>
            </div>
            <div class="input-group">
              <label class="input-label" for="new-password">New Password</label>
              <input id="new-password" class="input" type="password" placeholder="At least 8 characters, letters and numbers" />
              <p class="input-hint" id="new-password-hint"></p>
            </div>
            <div class="input-group">
              <label class="input-label" for="confirm-new-password">Confirm New Password</label>
              <input id="confirm-new-password" class="input" type="password" placeholder="Re-enter new password" />
              <p class="input-hint" id="confirm-new-password-hint"></p>
            </div>
            <div class="flex gap-2">
              <button id="change-password-save-btn" class="btn btn-primary btn-sm" type="submit">Save Password</button>
              <button id="change-password-cancel-btn" class="btn btn-ghost btn-sm" type="button">Cancel</button>
            </div>
          </form>

          <hr class="divider" />

          <div class="main-settings-row">
            <span class="main-settings-row-label main-settings-row-label--danger">Delete Account</span>
            <button id="delete-account-toggle-btn" class="btn btn-danger btn-sm" type="button">
              Delete
            </button>
          </div>

          <div id="delete-account-confirm" class="settings-inline-form hidden">
            <p class="text-secondary text-sm">This action is permanent. All your posts, comments, likes, and followers will be deleted. Type your password to confirm.</p>
            <div class="input-group">
              <label class="input-label" for="delete-confirm-password">Password</label>
              <input id="delete-confirm-password" class="input" type="password" placeholder="Enter your password to confirm" />
              <p class="input-hint" id="delete-confirm-password-hint"></p>
            </div>
            <div class="flex gap-2">
              <button id="delete-account-confirm-btn" class="btn btn-danger btn-sm" type="button">Permanently Delete Account</button>
              <button id="delete-account-cancel-btn" class="btn btn-ghost btn-sm" type="button">Cancel</button>
            </div>
          </div>
        </section>
      </div>
    </main>

    <div class="toast-container"></div>
  </body>
</html>
