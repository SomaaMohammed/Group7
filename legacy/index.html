<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UNI HUB</title>
    <script>
      var userId = localStorage.getItem("currentUserId");
      if (!userId) {
        location.replace("pages/login.html");
      } else {
        var follows = JSON.parse(localStorage.getItem("follows") || "[]");
        var hasFollows = follows.some(function (f) {
          return f.followerId === userId;
        });
        location.replace(hasFollows ? "pages/home.html" : "pages/global.html");
      }
    </script>
  </head>
  <body></body>
</html>
